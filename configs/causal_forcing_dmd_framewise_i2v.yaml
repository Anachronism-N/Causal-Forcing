# Stage 3: Causal DMD Distillation (I2V) - 方案 A
# 教师 (real_score) = Wan2.1-I2V-14B-720P (非 causal，冻结)
# 学生 (generator) = Stage 2 ODE 蒸馏产出的 CausalWanModel (1.3B I2V)
# 判别器 (fake_score) = Wan2.1-Fun-1.3B-InP (非 causal，可训练)
# 方案 A: independent_first_frame=true, num_frame_per_block=4
# 分块方式: [1, 4, 4, 4, 4, 4] = 1 + 4*5 = 21 帧
# initial_latent(1帧) 缓存到 KV cache，noise 为 20 帧，output = 1+20 = 21 帧
generator_ckpt: outputs/stage2_ode_i2v/checkpoint_model_003000/model.pt
generator_grad:
  model: true
# 教师和判别器模型名称
real_name: Wan2.1-I2V-14B-720P
fake_name: Wan2.1-Fun-1.3B-InP
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow
mixed_precision: true
seed: 42
sharding_strategy: hybrid_full
lr: 2.0e-06
lr_critic: 4.0e-07
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999
weight_decay: 0.01
batch_size: 1
ema_weight: 0.99
ema_start_step: 200
total_batch_size: 8
log_iters: 100
max_iters: 5000
negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'
dfake_gen_update_ratio: 5
image_or_video_shape:
- 1
- 21
- 16
- 60
- 104
distribution_loss: dmd
trainer: score_distillation
gradient_checkpointing: true
num_frame_per_block: 4
load_raw_video: false
# I2V 特有配置
i2v: true
causal: true
independent_first_frame: true
model_kwargs:
  model_name: Wan2.1-Fun-1.3B-InP
  timestep_shift: 5.0
data_path: /apdcephfs/wx_feature/home/cedricnie/data/lmdb_1219
