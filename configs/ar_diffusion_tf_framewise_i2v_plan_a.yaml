# Stage 1: AR Diffusion Training (I2V) - 方案 A
# 从 Wan2.1-Fun-1.3B-InP (I2V) 模型初始化 CausalWanModel
# 使用 Teacher Forcing + causal attention mask 训练
# 方案 A: 开启 independent_first_frame，首帧独立去噪
# 分块方式: [1, 4, 4, 4, 4, 4] = 1 + 4*5 = 21 帧
independent_first_frame: true
generator_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size
warp_denoising_step: true
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow
mixed_precision: true
seed: 42
sharding_strategy: hybrid_full
lr: 2.0e-06
beta1: 0.0
beta2: 0.999
weight_decay: 0.01
batch_size: 1
ema_weight: 0.99
ema_start_step: 2000000000
total_batch_size: 8
log_iters: 1000
negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'
image_or_video_shape:
- 1
- 21
- 16
- 60
- 104
distribution_loss: dmd
trainer: diffusion
gradient_checkpointing: true
num_frame_per_block: 4
load_raw_video: false
# I2V 特有配置
i2v: true
causal: true
model_kwargs:
  model_name: Wan2.1-Fun-1.3B-InP
  timestep_shift: 5.0
data_path: /apdcephfs/wx_feature/home/cedricnie/data/lmdb_1219
teacher_forcing: true
# 方案 A 说明：
# independent_first_frame=true + num_frame_per_block=4
# 训练分块: [1, 4, 4, 4, 4, 4] = 1 + 4*5 = 21 帧
# 数据集提供 21 帧 clean_latent，首帧作为 initial_latent 独立去噪，后 20 帧按 block_size=4 分块
# 推理: initial_latent(1帧) + [4, 4, 4, 4, 4](20帧噪声) = 21 帧输出
